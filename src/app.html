<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Clodia WebUI v2</title>
		<script>
			// Applica tema + zoom font PRIMA del paint (niente flash).
			try {
				var t = localStorage.getItem('clodia.webui.theme');
				if (t) document.documentElement.setAttribute('data-theme', t);
				var z = localStorage.getItem('clodia.webui.fontScale');
				if (z) document.documentElement.style.zoom = z;
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
